<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deepwell Summary Report Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="assets/mwss_logo.png" type="image/png" />
  <!-- iOS Home Screen Icon -->
  <link rel="apple-touch-icon" href="assets/mwss_logo.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="assets/mwss_logo.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/mwss_logo.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="assets/mwss_logo.png" />
  <!-- Web App Capable (PWA) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    @page { 
      size: landscape; 
      margin: 10mm;
    }
    body {
      background-color: #f8f9fa;
      font-family: system-ui, -apple-system, sans-serif;
      padding-top: env(safe-area-inset-top, 0px);
    }
    
    .report-page {
      max-width: 1300px;
      margin: 30px auto;
      background: white;
      padding: 40px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    /* Print Overrides */
    @media print {
      body {
        background-color: white !important;
      }
      .report-page {
        margin: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
        max-width: 100% !important;
      }
      .d-print-none {
        display: none !important;
      }
      .table {
        margin-bottom: 2rem !important;
      }
      .break-inside-avoid {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }
    
    .table th, .table td {
      vertical-align: middle;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  
  <div class="container-fluid py-3 bg-light border-bottom d-print-none shadow-sm position-sticky top-0 z-3">
    <div class="d-flex flex-wrap align-items-end justify-content-center gap-4 max-w-1300 mx-auto" style="max-width: 1300px;">
      <div class="d-flex align-items-center gap-2">
        <label class="form-label mb-0 fw-semibold text-secondary">Select Report Period:</label>
        <input type="month" id="dwSummaryMonth" class="form-control" style="width: auto;" />
        <button class="btn btn-primary shadow-sm" id="dwRefreshSummaryBtn">
          <i class="fa-solid fa-rotate-right me-1"></i>Generate Data
        </button>
      </div>
      <div class="ms-auto">
        <button class="btn btn-secondary shadow-sm" onclick="window.close()">
          <i class="fa-solid fa-xmark me-1"></i>Close
        </button>
        <button class="btn btn-success shadow-sm" onclick="window.print()">
          <i class="fa-solid fa-print me-1"></i>Print / Export PDF
        </button>
      </div>
    </div>
  </div>

  <div class="report-page">
    <!-- Print Header -->
    <div class="w-100 mb-4 pb-2 text-center">
      <!-- Centered group: Left Logo + Text + Right Logo -->
      <div class="d-flex justify-content-center align-items-center mt-2 mb-4 gap-4">
        <!-- Left Logo -->
        <img src="assets/mwss-seal-01.png" alt="MWSS Logo" style="width: 90px; height: 90px; object-fit: contain;">
        
        <!-- Center Text -->
        <div class="text-center" style="font-family: 'Times New Roman', Times, serif; color: #000; line-height: 1.2;">
          <div style="font-size: 14pt;">METROPOLITAN WATERWORKS AND SEWERAGE SYSTEM</div>
          <div style="font-size: 13pt;">CORPORATE OFFICE</div>
        </div>
        
        <!-- Right Logo -->
        <img src="assets/Bagong Pilipinas Logo.png" alt="Bagong Pilipinas" style="width: 100px; height: 100px; object-fit: contain;">
      </div>
      <h5 class="fw-bold mt-4 mb-2 text-uppercase text-decoration-underline" style="font-family: system-ui, -apple-system, sans-serif;">Deepwell Summary Report</h5>
    </div>
    
    <div id="dwSummaryReportContainer">
      <div class="text-center text-muted p-5 bg-light rounded border border-dashed">
        <i class="fa-solid fa-table-list fa-3x mb-3 text-secondary opacity-50"></i>
        <h5 class="fw-semibold text-secondary">No Data Loaded</h5>
        <p>Please select a month and click Generate above.</p>
      </div>
    </div>
  </div>

  <script>
    function fmtNum(val) {
      const num = Number(val);
      if (isNaN(num)) return '0.00';
      return new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
    }

    function monthKeyToLabel(ym) {
      if (!ym || typeof ym !== 'string' || ym.length < 7) return ym || '';
      const [y, m] = ym.split('-');
      const d = new Date(Number(y), Number(m) - 1, 1);
      if (isNaN(d.getTime())) return ym;
      return d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
    }

    function categorizeStatus(statusStr) {
      const s = (statusStr || '').trim().toLowerCase();
      if (!s) return 'Others';
      if (s.includes('repair') || s.includes('maintenance')) return 'Under repair or Under Maintenance';
      if (s.includes('abandon')) return 'Abandoned';
      if (s.includes('private') || s.includes('exploration')) return 'Private or For exploration';
      if (s.includes('inactive')) return 'Inactive';
      if (s.includes('active') || s.includes('ready') || s.includes('standby') || s.includes('operable')) return 'Active or Operable';
      if (s.includes('ongoing')) return 'Ongoing';
      return 'Others';
    }

    const reportCategories = [
      'Active or Operable',
      'Under repair or Under Maintenance',
      'Ongoing',
      'Inactive',
      'Abandoned',
      'Private or For exploration',
      'Others'
    ];

    let deepwells = [];

    function generateSummaryReport() {
      const monthInput = document.getElementById('dwSummaryMonth');
      const container = document.getElementById('dwSummaryReportContainer');
      const selectedMonth = monthInput.value;
      
      const summary = {
        MWCI: {},
        MWSI: {}
      };
      
      ['MWCI', 'MWSI'].forEach(prov => {
        reportCategories.forEach(cat => {
          summary[prov][cat] = { count: 0, ratedYield: 0, monthProd: 0, totalProd: 0 };
        });
      });

      // Helper to generate last N months
      function getMonthKeys(n, startMonth) {
        const keys = [];
        let [y, m] = startMonth.split('-').map(Number);
        for (let i = 0; i < n; i++) {
          let curY = y, curM = m - i;
          while (curM < 1) { curM += 12; curY -= 1; }
          keys.push(`${curY}-${String(curM).padStart(2, '0')}`);
        }
        return keys;
      }

      // 1. Find latest months per provider
      const latestMonths = { MWCI: '', MWSI: '' };
      deepwells.forEach(dw => {
        const prov = (dw.provider || '').toUpperCase();
        if (latestMonths[prov] === undefined) return;
        (dw.months || []).forEach(m => {
          if (m.month > latestMonths[prov]) latestMonths[prov] = m.month;
        });
      });
      // Fallback
      const now = new Date();
      const fallback = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      if (!latestMonths.MWCI) latestMonths.MWCI = fallback;
      if (!latestMonths.MWSI) latestMonths.MWSI = fallback;
      
      const selectedYear = selectedMonth ? selectedMonth.split('-')[0] : '';

      deepwells.forEach(dw => {
        const prov = (dw.provider || '').toUpperCase();
        if (prov !== 'MWCI' && prov !== 'MWSI') return;
        
        // On-the-fly "Active" check
        const refMonth = latestMonths[prov];
        const last2 = getMonthKeys(2, refMonth);
        const monthSet = new Set((dw.months || []).map(m => String(m.month || '').trim()));
        const isCurrentlyActive = last2.some(k => monthSet.has(k));

        let cat = categorizeStatus(dw.status);
        
        // If the well has production in the last 2 months, force it to "Active or Operable"
        if (isCurrentlyActive) {
          cat = 'Active or Operable';
        } else if (cat === 'Active or Operable') {
          // If it's NOT active per data but the status says "Active or Operable", 
          // move it to Inactive (or let it stay if categorizeStatus handled other keywords like "standby")
          // But wait, the dashboard calls it Standby. For this report, we'll keep it as Inactive if no production.
          cat = 'Inactive';
        }
        
        if (!summary[prov][cat]) return;
        
        summary[prov][cat].count += 1;
        summary[prov][cat].ratedYield += (Number(dw.ratedYield) || 0);
        
        let mProd = 0;
        let yProd = 0;
        
        if (Array.isArray(dw.months)) {
          if (selectedMonth) {
            const mData = dw.months.find(m => m.month === selectedMonth);
            if (mData) {
              mProd = Number(mData.prod) || 0;
            }
          }
          if (selectedYear) {
            dw.months.forEach(m => {
              if (m.month && m.month.startsWith(selectedYear)) {
                yProd += Number(m.prod) || 0;
              }
            });
          }
        }
        
        if (!selectedYear) {
          yProd = Number(dw.totalProd) || 0; // Fallback if no month is selected
        }
        
        summary[prov][cat].monthProd += mProd;
        summary[prov][cat].totalProd += yProd;
      });
      
      function renderProviderTable(provName, data) {
        let rowsHtml = '';
        let totCount = 0, totYield = 0, totMonthProd = 0, totProd = 0;
        
        reportCategories.forEach(cat => {
          const d = data[cat];
          totCount += d.count;
          totYield += d.ratedYield;
          totMonthProd += d.monthProd;
          totProd += d.totalProd;
          
          rowsHtml += `
            <tr>
              <td class="fw-semibold px-3">${cat}</td>
              <td class="text-end px-3">${fmtNum(d.ratedYield)}</td>
              <td class="text-center fw-medium">${d.count}</td>
              <td class="text-end px-3">${fmtNum(d.monthProd)}</td>
              <td class="text-end fw-bold px-3">${fmtNum(d.totalProd)}</td>
            </tr>
          `;
        });
        
        const totalHeaderLabel = selectedYear ? `Overall Total (${selectedYear})` : 'Overall Total';

        return `
          <div class="mb-5 break-inside-avoid">
            <h5 class="fw-bold bg-light p-2 border-start border-5 border-primary text-primary shadow-sm mb-3">
              ${provName} Deepwells Summary
            </h5>
            <div class="table-responsive shadow-sm rounded">
              <table class="table table-bordered table-hover align-middle mb-0">
                <thead class="table-primary text-center align-middle">
                  <tr>
                    <th rowspan="2" class="py-3 fs-6">Status Category</th>
                    <th rowspan="2" class="py-3">Rated Yield<br><span class="fw-normal small">(cu.m/day)</span></th>
                    <th rowspan="2" class="py-3">Total Deepwells<br><span class="fw-normal small">(count)</span></th>
                    <th colspan="2" class="py-2 border-bottom-0">Production Data <span class="fw-normal small">(cu.m)</span></th>
                  </tr>
                  <tr>
                    <th class="py-2 bg-primary text-white bg-opacity-75">${selectedMonth ? monthKeyToLabel(selectedMonth) : 'Selected Month'}</th>
                    <th class="py-2 bg-primary text-white">${totalHeaderLabel}</th>
                  </tr>
                </thead>
                <tbody class="bg-white">
                  ${rowsHtml}
                </tbody>
                <tfoot class="table-light border-top border-2 border-primary fw-bold">
                  <tr>
                    <td class="px-3 fs-6 text-primary">GRAND TOTAL</td>
                    <td class="text-end text-primary fs-6 px-3">${fmtNum(totYield)}</td>
                    <td class="text-center text-primary fs-6">${totCount}</td>
                    <td class="text-end text-primary fs-6 px-3">${fmtNum(totMonthProd)}</td>
                    <td class="text-end text-primary fs-5 px-3">${fmtNum(totProd)}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        `;
      }
      
      let html = '';
      if (!selectedMonth) {
        html += `<div class="alert alert-warning py-3 mb-4 d-print-none shadow-sm border-warning-subtle text-warning-emphasis">
                   <i class="fa-solid fa-triangle-exclamation me-2"></i> 
                   <strong>No month selected!</strong> Production for the selected month column will show as 0. Please select a month in the header above to view its production data.
                 </div>`;
      }
      html += renderProviderTable('MWCI', summary.MWCI);
      html += renderProviderTable('MWSI', summary.MWSI);
      container.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', () => {
      // 1. Initialize month picker to current
      const monthInput = document.getElementById('dwSummaryMonth');
      const now = new Date();
      monthInput.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      
      // 2. Load deepwells data from sessionStorage
      try {
        const dataStr = sessionStorage.getItem('deepwellsData');
        if (dataStr) {
          deepwells = JSON.parse(dataStr);
        } else {
          deepwells = [];
        }
      } catch (err) {
        console.error('Error parsing deepwellsData from sessionStorage', err);
      }

      // 3. Attach listeners
      document.getElementById('dwRefreshSummaryBtn').addEventListener('click', generateSummaryReport);
      
      // 4. Initial generate
      generateSummaryReport();
    });
  </script>
</body>
</html>
